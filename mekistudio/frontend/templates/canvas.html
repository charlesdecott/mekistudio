<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ project_name }} — mekistudio</title>
  <link rel="stylesheet" href="/static/css/canvas.css">
  <!-- xterm.js (terminal) : feuille de style + UMD vendorés (window.Terminal / window.FitAddon). -->
  <link rel="stylesheet" href="/static/vendor/xterm.css">
  <script>window.__PROJECT_NAME__ = {{ project_name | tojson }};</script>
  <!-- racine du repo (posix) : permet de normaliser un chemin lu ABSOLU (hook Read Windows)
       en chemin RELATIF posix -> clé de dossier canonique (anti-doublons). -->
  <script>window.__REPO_ROOT__ = {{ repo_root | tojson }};</script>
  <!-- canvas.js AVANT Alpine : il enregistre le composant sur `alpine:init`,
       qui doit être écouté avant qu'Alpine ne démarre. -->
  <!-- géométries pures (window.MekiCables / MekiCollision) — avant canvas.js qui les utilise. -->
  <script defer src="/static/js/cables.js"></script>
  <script defer src="/static/js/collision.js"></script>
  <!-- brique G : dossiers-en-nodes (MekiFolders) + rendu node git (MekiGitNode), purs — avant canvas.js.
       (le placement organique est INCRÉMENTAL : chaque node posé une fois dans un trou libre, jamais re-calculé.) -->
  <script defer src="/static/js/folders.js"></script>
  <script defer src="/static/js/git-node.js"></script>
  <!-- territoires de dossier (MekiTerritories) : blob arrondi englobant les fichiers d'un dossier. -->
  <script defer src="/static/js/territories.js"></script>
  <!-- relaxation des node-zones (MekiZoneLayout) : disques répulsifs + ressort backbone — avant canvas.js. -->
  <script defer src="/static/js/zonelayout.js"></script>
  <!-- topologie/géométrie pure du subcanvas (MekiSubcanvas : descendants + bornes dérivées) — avant canvas.js. -->
  <script defer src="/static/js/subcanvas.js"></script>
  <!-- mapping pur hook/event -> intention d'impulsion (window.MekiImpulses) — avant chat-view/canvas. -->
  <script defer src="/static/js/chat-impulses.js"></script>
  <!-- chat : markdown assaini + réducteur pur + vue, AVANT canvas.js et AVANT Alpine.
       Les `defer` s'exécutent dans l'ordre du document -> window.marked/DOMPurify/MekiChat
       /MekiChatView sont prêts au 1er rendu de la branche chat de renderComponent. -->
  <script defer src="/static/vendor/marked.min.js"></script>
  <script defer src="/static/vendor/purify.min.js"></script>
  <script defer src="/static/js/chat-model.js"></script>
  <script defer src="/static/js/chat-view.js"></script>
  <!-- terminal : xterm UMD + fit addon (vendorés) puis la vue ; AVANT canvas.js -> window.Terminal
       /FitAddon/MekiTerminal sont prêts au 1er rendu de la branche terminal de renderComponent. -->
  <script defer src="/static/vendor/xterm.js"></script>
  <script defer src="/static/vendor/xterm-addon-fit.js"></script>
  <script defer src="/static/js/terminal-view.js"></script>
  <script defer src="/static/js/canvas.js"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <!-- éditeur CodeMirror : module ESM, expose window.MekiEditor (chargé en async). -->
  <script type="module" src="/static/js/editor.js"></script>
</head>
<body>
  <div id="canvas" x-data="canvas"
       :class="'tool-' + tool"
       :style="gridStyle()"
       @mousedown="startPan($event)" @mousemove="onPan($event)"
       @mouseup="endPan()" @mouseleave="endPan()"
       @wheel.prevent="onZoom($event)">

    <div class="toolbar" @mousedown.stop @wheel.stop>
      <button type="button" class="tool-btn" :class="{ active: tool === 'select' }"
              @click="tool = 'select'" title="Sélection">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/><path d="M13 13l6 6"/>
        </svg>
      </button>
      <button type="button" class="tool-btn" :class="{ active: tool === 'move' }"
              @click="tool = 'move'" title="Déplacer">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="5 9 2 12 5 15"/><polyline points="9 5 12 2 15 5"/>
          <polyline points="15 19 12 22 9 19"/><polyline points="19 9 22 12 19 15"/>
          <line x1="2" y1="12" x2="22" y2="12"/><line x1="12" y1="2" x2="12" y2="22"/>
        </svg>
      </button>
      <button type="button" class="tool-btn" :class="{ active: tool === 'resize' }"
              @click="tool = 'resize'" title="Redimensionner">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
          <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
        </svg>
      </button>
      <button type="button" class="tool-btn tool-btn-delete" :class="{ active: tool === 'delete' }"
              @click="tool = 'delete'" title="Suppression — clic sur un node fermable (fichier/dossier) pour le fermer">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
          <path d="M10 11v6M14 11v6"/><path d="M9 6V4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"/>
        </svg>
      </button>
    </div>

    <div class="hud" x-text="projectName"></div>
    <div class="world" :style="worldStyle()"></div>

    <div class="modal-backdrop" x-show="settingsOpen" x-cloak
         @mousedown.stop @wheel.stop @click="closeSettings()">
      <div class="modal" @click.stop @mousedown.stop>
        <div class="modal-head">
          <span x-text="settingsTitle"></span>
          <button type="button" class="modal-x" @click="closeSettings()">✕</button>
        </div>
        <div class="modal-body">
          <template x-if="settingsKind === 'chat'">
            <div class="chat-spawn-settings">
              <p class="modal-label">Aperçus d'éditeurs (fichiers lus par Claude)</p>
              <label class="modal-row">Mode
                <select x-model="settingsMode">
                  <option value="ephemeral">Éphémère — disparaît après le délai</option>
                  <option value="capped">Plafond — recyclage du plus ancien (FIFO)</option>
                  <option value="unlimited">Illimité — éditeurs permanents</option>
                </select>
              </label>
              <label class="modal-row" x-show="settingsMode === 'ephemeral'">Délai (min)
                <input type="number" min="1" max="1440" x-model.number="settingsTtl">
              </label>
              <label class="modal-row" x-show="settingsMode !== 'unlimited'">Plafond (nb max)
                <input type="number" min="1" max="200" x-model.number="settingsCap">
              </label>
            </div>
          </template>
          <template x-if="settingsKind !== 'chat'">
            <div>
              <template x-if="settingsKind === 'fileexplorer'">
                <label class="modal-row compact-row">
                  <input type="checkbox" x-model="settingsCompact">
                  Compacter les dossiers (style VSCode : fusionne les dossiers à enfant unique)
                </label>
              </template>
              <p class="modal-label">Fichiers / dossiers exclus</p>
              <ul class="exclude-list">
                <template x-for="(ex, i) in settingsExcludes" :key="i">
                  <li>
                    <span x-text="ex"></span>
                    <button type="button" @click="removeExclude(i)" title="Retirer">✕</button>
                  </li>
                </template>
                <li x-show="settingsExcludes.length === 0" class="exclude-empty">aucune exclusion</li>
              </ul>
              <form class="exclude-add" @submit.prevent="addExclude()">
                <input type="text" x-model="newExclude" placeholder="nom simple : .git, node_modules">
                <button type="submit">Ajouter</button>
              </form>
            </div>
          </template>
          <p class="modal-error" x-show="settingsError" x-cloak x-text="settingsError"></p>
        </div>
        <div class="modal-foot">
          <button type="button" @click="closeSettings()">Annuler</button>
          <button type="button" class="primary" @click="saveSettings()">Enregistrer</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
